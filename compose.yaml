services:
    scraper:
      image: data_scraper
      container_name: scraper
      build: .
      volumes:
        - ./data_scraping:/app/data_scraping
        - ./data_scraping/scraper.py:/app/scraper.py
    trainer:
      image: nn_trainer
      container_name: trainer
      build:
        context: .
        dockerfile: Dockerfile.training
      volumes:
        - ./training_loss.png:/app/training_loss.png
        - ./data_scraping:/app/data_scraping
        - ./parameters:/app/parameters
    watcher:
      image: data_watcher
      container_name: watcher
      build:
        context: .
        dockerfile: Dockerfile.watcher
      volumes:
        - ./data_scraping:/app/data_scraping
        - ./data_scraping/scraper.py:/app/scraper.py
        - /var/run/docker.sock:/var/run/docker.sock
        - ./compose.yaml:/app/compose.yaml
      restart: always
      depends_on:
        - scraper
    inference:
      image: model_inference
      container_name: inference
      build:
        context: .
        dockerfile: Dockerfile.inference
      volumes:
      - ./parameters:/app/parameters